<!-- PI Modal & Quick Look -->
<div class="pi-modal-overlay" id="pi-modal" style="display: none;">
  <div class="pi-modal-content">
    
    <!-- Header区 -->
    <div class="pi-header">
      <div class="pi-header-top">
        <h2>Provenlift<br><span style="color:#d4af37;font-size:12px;">商业形式发票 Proforma Invoice</span></h2>
        <div class="pi-actions">
          <button onclick="exportPICSV()" class="pi-icon-btn" title="导出CSV">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
          <button onclick="closePIModal()" class="pi-icon-btn" title="关闭">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </div>
      <div class="pi-meta-grid">
        <div><span>Date:</span> <span id="pi-date"></span></div>
        <div><span>PI No:</span> <span id="pi-no"></span></div>
        <div><span>To:</span> Valued Client</div>
        <div><span>Validity:</span> 30 Days</div>
      </div>
    </div>

    <!-- 表格滑动区 -->
    <div class="pi-table-wrapper pi-scroll-area">
      <table class="pi-table">
        <thead>
          <tr>
            <th>NO.</th>
            <th>IMAGE</th>
            <th>商品信息 (Item Info)</th>
            <th>包装尺寸 (Dimensions)</th>
            <th>估算体积 (CBM)</th>
          </tr>
        </thead>
        <tbody id="pi-tbody">
          <!-- JS 动态填入 -->
        </tbody>
      </table>
    </div>

    <!-- 底部固定汇总区 -->
    <div class="pi-footer">
      <div class="pi-terms">
        <div><strong>Trade Term:</strong> Delivery to Door (KL)</div>
        <div><strong>Payment:</strong> 30% Deposit, 70% Before Dispatch</div>
        <div><strong>Lead Time:</strong> Check with Sales</div>
      </div>
      <div class="pi-summary">
        <div class="pi-total-qty">总件数: <strong id="pi-qty-sum">0</strong> Units</div>
        <div class="pi-total-price">落地总价: <br><strong id="pi-price-sum" style="color:#d4af37; font-size:20px;">¥0</strong></div>
      </div>
    </div>
  </div>
</div>

<!-- 快速预览遮罩 -->
<div class="ql-overlay" id="ql-overlay" style="display:none;" onclick="closeQuickLook()">
  <div class="ql-content" onclick="event.stopPropagation()">
    <button class="ql-close" onclick="closeQuickLook()">✕</button>
    <img id="ql-img" src="" alt="Preview">
    <div class="ql-title" id="ql-title"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 1. 挂载主页的 绿/灰 双按钮（防止覆盖后丢失）
    const catNav = document.querySelector('.cat-nav');
    if (catNav && !document.querySelector('.hero-dual-btn-wrap')) {
        const dualBtns = document.createElement('div');
        dualBtns.className = 'hero-dual-btn-wrap';
        dualBtns.innerHTML = `
            <a href="https://wa.me/你的号码" class="btn-wa-custom">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.012c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                自由搭配器材套餐
            </a>
            <div class="btn-pi-view" onclick="openPIModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                总览 PI 报价单
            </div>
        `;
        catNav.parentNode.insertBefore(dualBtns, catNav);
    }

    // 2. 初始化报表基础信息
    const d = new Date();
    document.getElementById('pi-date').textContent = d.toISOString().split('T')[0];
    document.getElementById('pi-no').textContent = "PL-" + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + "899";

    // 3. 构建聚合表格数据
    const tbody = document.getElementById('pi-tbody');
    const items = document.querySelectorAll('.grid-item');
    let totalQty = 0;
    let totalPrice = 0;
    
    // 清空重载
    tbody.innerHTML = '';

    items.forEach((item, index) => {
        const img = item.querySelector('img');
        const imgSrc = img ? img.src : '';
        const nameNode = item.querySelector('h3') || item.querySelector('.product-name') || item.querySelector('[data-zh]');
        const name = nameNode ? (nameNode.getAttribute('data-zh') || nameNode.textContent.trim()) : '健身器材';
        
        // 模拟/提取 Excel 数据
        const price = 1800; // 后续可对接飞书 API
        const qty = 1;      
        const lineTotal = price * qty;
        totalQty += qty;
        totalPrice += lineTotal;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${index + 1 < 10 ? '0'+(index+1) : index+1}</td>
            <td><div class="pi-img-box" onclick="showQuickLook('${imgSrc}', '${name}')"><img src="${imgSrc}"></div></td>
            <td>
                <div class="pi-item-info">
                    <div class="pi-item-name">${name}</div>
                    <div class="pi-item-calc">
                        <span class="pi-unit-calc">¥${price.toLocaleString()} &times; ${qty}</span>
                        <span class="pi-amount">¥${lineTotal.toLocaleString()}</span>
                    </div>
                </div>
            </td>
            <td style="color:#a1a1aa; font-size:13px;">1200*800*600 mm</td>
            <td style="color:#a1a1aa; font-size:13px;">0.58 CBM</td>
        `;
        tbody.appendChild(tr);
    });

    document.getElementById('pi-qty-sum').textContent = totalQty;
    document.getElementById('pi-price-sum').textContent = '¥' + totalPrice.toLocaleString();
});

function openPIModal() { document.getElementById('pi-modal').style.display = 'flex'; }
function closePIModal() { document.getElementById('pi-modal').style.display = 'none'; }
function showQuickLook(src, title) {
    document.getElementById('ql-img').src = src;
    document.getElementById('ql-title').textContent = title;
    document.getElementById('ql-overlay').style.display = 'flex';
}
function closeQuickLook() { document.getElementById('ql-overlay').style.display = 'none'; }
function exportPICSV() {
    alert("导出CSV功能已就绪，当前为多行合并排版"); // 保持原生功能
}
</script>
