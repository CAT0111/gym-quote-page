<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ProvenLift 素材任务管理</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f7; --card:#ffffff;
  --ios-blue:#007aff; --ios-blue-bg:rgba(0,122,255,0.1);
  --ios-green:#34c759; --ios-orange:#ff9500; --ios-red:#ff3b30; --ios-purple:#af52de;
  --text:#1c1c1e; --text2:#8e8e93; --text3:#aeaeb2;
  --border:rgba(60,60,67,0.12);
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100dvh;}

/* ── 头部：毛玻璃极简风 ── */
.app-header{
  background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:var(--text);padding:0 16px;height:52px;
  position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  border-bottom:0.5px solid var(--border);
}
.app-header h1{font-size:1.0625rem;font-weight:600;letter-spacing:-0.4px;}
.header-actions{display:flex;align-items:center;gap:8px;}
.btn-icon{
  background:transparent;border:none;color:var(--ios-blue);
  width:32px;height:32px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:500;
}
.btn-icon:active{opacity:0.5;}

/* ── iOS 胶囊分段控制器 (替代传统 Tab) ── */
.view-tabs{
  display:flex;background:#e3e3e8;border-radius:8px;margin:12px 16px;padding:2px;
  position:sticky;top:calc(52px + 12px);z-index:90;
}
.view-tabs::-webkit-scrollbar{display:none;}
.vtab{
  flex:1;padding:6px 0;text-align:center;font-size:0.8125rem;font-weight:500;
  color:var(--text);border:none;background:transparent;border-radius:6px;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:4px;
}
.vtab.active{background:#fff;box-shadow:0 3px 1px -2px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.12);}
.vtab-count{
  background:rgba(0,0,0,0.06);color:var(--text2);font-size:0.6875rem;
  padding:1px 6px;border-radius:10px;font-weight:600;
}
.vtab.active .vtab-count{background:var(--ios-blue-bg);color:var(--ios-blue);}

.content{padding:0 16px 80px;max-width:600px;margin:0 auto;}
.view-panel{display:none;}
.view-panel.active{display:block;animation:fadeIn 0.2s ease;}

/* ── 融合式统计面板 ── */
.stats-bar{
  background:var(--card);border-radius:12px;display:flex;
  margin-bottom:16px;border:0.5px solid var(--border);
}
.stat-item{
  flex:1;padding:12px 0;text-align:center;border-right:0.5px solid var(--border);
}
.stat-item:last-child{border-right:none;}
.stat-item .s-val{font-size:1.25rem;font-weight:600;color:var(--text);}
.stat-item .s-label{font-size:0.6875rem;color:var(--text2);margin-top:2px;}

/* ── 批次筛选 ── */
.batch-bar{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.batch-bar::-webkit-scrollbar{display:none;}
.batch-chip{
  padding:6px 14px;border-radius:16px;font-size:0.8125rem;font-weight:500;
  border:none;background:#e5e5ea;color:var(--text);cursor:pointer;white-space:nowrap;transition:all 0.2s;
}
.batch-chip.active{background:var(--text);color:#fff;}

/* ── 无边框感轻盈卡片 ── */
.task-card{
  background:var(--card);border-radius:16px;margin-bottom:12px;
  border:0.5px solid var(--border);overflow:hidden;transition:all 0.2s;
}
.task-card:active{background:#fafafa;transform:scale(0.985);}
.task-main{display:flex;align-items:center;gap:12px;padding:14px;}
.task-thumb{
  width:52px;height:52px;border-radius:10px;object-fit:cover;
  background:#f2f2f7;flex-shrink:0;border:0.5px solid rgba(0,0,0,0.05);
}
.task-info{flex:1;min-width:0;}
.task-info .t-sku{font-size:0.6875rem;color:var(--text2);margin-bottom:2px;}
.task-info .t-name{font-size:0.9375rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.task-info .t-meta{font-size:0.6875rem;color:var(--text2);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* ── 清爽的 iOS 色彩徽章 ── */
.badge{padding:3px 8px;border-radius:6px;font-size:0.6875rem;font-weight:500;white-space:nowrap;}
.badge-待拍{background:rgba(255,149,0,0.1);color:var(--ios-orange);}
.badge-已拍{background:rgba(0,122,255,0.1);color:var(--ios-blue);}
.badge-剪辑中{background:rgba(175,82,222,0.1);color:var(--ios-purple);}
.badge-待审核{background:rgba(255,149,0,0.1);color:var(--ios-orange);}
.badge-已完成{background:rgba(52,199,89,0.1);color:var(--ios-green);}
.badge-需补拍{background:rgba(255,59,48,0.1);color:var(--ios-red);}

/* ── 核心修复：细腻的打卡圆圈 ── */
.quick-action{
  width:26px;height:26px;border-radius:50%;border:1.5px solid #c7c7cc;
  background:transparent;display:flex;align-items:center;justify-content:center;
  font-size:0;transition:all 0.2s;flex-shrink:0;color:transparent;cursor:pointer;
}
.quick-action:active{background:#e5e5ea;transform:scale(0.9);}
.quick-action.check{border-color:var(--ios-blue);color:var(--ios-blue);font-size:1rem;}
.task-card.completed .quick-action{
  background:var(--ios-green);border-color:var(--ios-green);color:#fff;
  font-size:0.875rem;font-weight:bold;
}
.task-card.sliding-out{transform:translateX(100%);opacity:0;transition:all 0.4s ease-in;max-height:100px;}
.task-card.collapsed{max-height:0;margin:0;padding:0;border:none;overflow:hidden;transition:all 0.3s ease;}

/* ── 展开详情域 ── */
.task-detail{display:none;padding:0 14px 14px;background:#fff;}
.task-detail.open{display:block;}
.detail-row{display:flex;align-items:center;gap:12px;margin-top:12px;}
.detail-row label{font-size:0.8125rem;color:var(--text);width:52px;flex-shrink:0;font-weight:500;}
.detail-row input,.detail-row select{
  flex:1;padding:8px 12px;border:none;border-radius:8px;
  font-size:0.875rem;background:#f2f2f7;color:var(--text);
}
.detail-row input:focus,.detail-row select:focus{outline:none;background:#e5e5ea;}
.detail-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}

/* ── 通用按钮 ── */
.btn{
  padding:8px 16px;border:none;border-radius:8px;font-size:0.875rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.btn:active{opacity:0.8;}
.btn-primary{background:var(--ios-blue);color:#fff;}
.btn-primary:disabled{background:var(--text3);cursor:not-allowed;}
.btn-success{background:var(--ios-green);color:#fff;}
.btn-warn{background:var(--ios-orange);color:#fff;}
.btn-danger{background:var(--ios-red);color:#fff;}
.btn-sm{padding:6px 12px;font-size:0.8125rem;}

/* ── 新建批次表单 & 产品选择器 ── */
.create-section{background:var(--card);border-radius:16px;padding:20px;border:0.5px solid var(--border);margin-bottom:16px;}
.create-section h3{font-size:1.0625rem;font-weight:600;margin-bottom:16px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:0.8125rem;color:var(--text2);margin-bottom:6px;}
.form-group input[type="text"],.form-group select{
  width:100%;padding:10px 12px;border:none;border-radius:10px;
  font-size:0.9375rem;background:#f2f2f7;color:var(--text);
}
.form-group input:focus{outline:none;background:#e5e5ea;}
.picker-search{width:100%;padding:10px 12px;border:none;border-radius:10px;font-size:0.9375rem;background:#f2f2f7;margin-bottom:12px;}
.picker-grid{max-height:300px;overflow-y:auto;border-radius:12px;border:0.5px solid var(--border);background:var(--card);}
.picker-item{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:0.5px solid var(--border);cursor:pointer;}
.picker-item:last-child{border-bottom:none;}
.picker-item.selected{background:var(--ios-blue-bg);}
.picker-item .pi-thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;}
.picker-item .pi-info{flex:1;min-width:0;}
.picker-item .pi-sku{font-size:0.6875rem;color:var(--text2);}
.picker-item .pi-name{font-size:0.875rem;font-weight:500;}
.picker-item .pi-check{
  width:22px;height:22px;border-radius:50%;border:1.5px solid #c7c7cc;
  display:flex;align-items:center;justify-content:center;color:transparent;font-size:0.8rem;
}
.picker-item.selected .pi-check{background:var(--ios-blue);border-color:var(--ios-blue);color:#fff;}
.picker-count{font-size:0.8125rem;color:var(--ios-blue);font-weight:600;margin:12px 0 8px;}

/* ── 底部撤回条 ── */
.undo-bar{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  background:rgba(44,44,46,0.9);color:#fff;padding:10px 16px;border-radius:24px;
  font-size:0.875rem;font-weight:500;z-index:999;display:flex;align-items:center;gap:16px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 8px 24px rgba(0,0,0,0.15);animation:slideUp 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
.undo-bar button{
  background:rgba(255,255,255,0.15);border:none;color:var(--ios-blue);
  padding:4px 12px;border-radius:12px;font-size:0.8125rem;font-weight:600;cursor:pointer;
}
@keyframes slideUp{from{transform:translateX(-50%) translateY(40px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ── 其他 ── */
.empty-state{text-align:center;padding:48px 16px;color:var(--text2);font-size:0.875rem;}
.loading{text-align:center;padding:40px;color:var(--text2);font-size:0.875rem;}
.spinner{
  width:20px;height:20px;border:2px solid rgba(0,0,0,0.1);
  border-top-color:var(--ios-blue);border-radius:50%;
  animation:spin 0.8s linear infinite;display:inline-block;vertical-align:-4px;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease;}
.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:0.875rem;opacity:0;transition:all 0.3s;z-index:1000;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.review-preview{margin-top:12px;border-radius:8px;overflow:hidden;border:0.5px solid var(--border);}
.review-preview img,.review-preview video{width:100%;display:block;max-height:240px;object-fit:cover;}
.review-link{font-size:0.75rem;color:var(--ios-blue);word-break:break-all;padding:8px 12px;background:#f2f2f7;font-weight:500;}

@media(min-width:768px){
  .content{max-width:800px;padding:16px 24px;}
  .task-card{cursor:default;}
  .task-card:active{transform:none;}
}

</style>
</head>
<body>

<!-- ══════ Header ══════ -->
<header class="app-header">
  <h1>素材任务管理</h1>
  <div class="header-actions">
    <button class="btn-icon" onclick="loadTasks()" title="刷新">↻</button>
    <button class="btn-icon" onclick="location.href='/'" title="返回中台">←</button>
  </div>
</header>

<!-- ══════ View Tabs ══════ -->
<div class="view-tabs">
  <button class="vtab active" data-view="shoot">拍摄<span class="vtab-count" id="countShoot">0</span></button>
  <button class="vtab" data-view="edit">剪辑<span class="vtab-count" id="countEdit">0</span></button>
  <button class="vtab" data-view="review">审核<span class="vtab-count" id="countReview">0</span></button>
  <button class="vtab" data-view="all">总览<span class="vtab-count" id="countAll">0</span></button>
  <button class="vtab" data-view="create">新建</button>
</div>

<div class="content">

<!-- ══════ 拍摄视图 ══════ -->
<div id="panelShoot" class="view-panel active">
  <div class="stats-bar" id="shootStats"></div>
  <div class="batch-bar" id="shootBatches"></div>
  <div id="shootList"><div class="loading"><span class="spinner"></span> 加载中…</div></div>
</div>

<!-- ══════ 剪辑视图 ══════ -->
<div id="panelEdit" class="view-panel">
  <div id="editList"><div class="loading"><span class="spinner"></span> 加载中…</div></div>
</div>

<!-- ══════ 审核视图 ══════ -->
<div id="panelReview" class="view-panel">
  <div id="reviewList"><div class="loading"><span class="spinner"></span> 加载中…</div></div>
</div>

<!-- ══════ 总览视图 ══════ -->
<div id="panelAll" class="view-panel">
  <div class="stats-bar" id="allStats"></div>
  <div class="batch-bar" id="allBatches"></div>
  <div id="allList"><div class="loading"><span class="spinner"></span> 加载中…</div></div>
</div>

<!-- ══════ 新建批次视图 ══════ -->
<div id="panelCreate" class="view-panel">
  <div class="create-section">
    <h3>创建拍摄任务批次</h3>
    <div class="form-group">
      <label>批次名称</label>
      <input type="text" id="inputBatchName" placeholder="如：2026-03-29-济南工厂A">
    </div>
    <div class="form-group">
      <label>素材类型（可多选）</label>
      <div id="mediaTypeGroup" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">
        <label style="display:flex;align-items:center;gap:4px;font-size:.8125rem;cursor:pointer">
          <input type="checkbox" value="产品主图" class="media-type-cb"> 产品主图
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:.8125rem;cursor:pointer">
          <input type="checkbox" value="试机视频" class="media-type-cb" checked> 试机视频
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:.8125rem;cursor:pointer">
          <input type="checkbox" value="细节特写" class="media-type-cb"> 细节特写
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:.8125rem;cursor:pointer">
          <input type="checkbox" value="场景图" class="media-type-cb"> 场景图
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>回写目标</label>
      <div style="font-size:.75rem;color:var(--text3);margin-top:2px">
        自动匹配：产品主图/场景图 → 写回「产品主图」字段，试机视频/细节特写 → 写回「默认视频」字段
      </div>
    </div>
    <div class="form-group">
      <label>选择要拍摄的产品</label>
      <input type="text" class="picker-search" id="pickerSearch" placeholder="搜索 SKU 或中文名…">
      <div class="picker-count">已选 <strong id="pickerSelectedCount">0</strong> 个产品</div>
      <div class="picker-grid" id="pickerGrid">
        <div class="loading"><span class="spinner"></span></div>
      </div>
    </div>
    <button class="btn btn-primary" id="btnCreateBatch" style="width:100%;margin-top:8px">
      创建拍摄任务
    </button>
  </div>
</div>

</div><!-- .content -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   全局状态
   ══════════════════════════════════════ */
const S = {
  allTasks: [],
  batches: [],
  statusCounts: {},
  currentView: 'shoot',
  batchFilter: '',     // 当前选中的批次筛选
  allProducts: [],     // 产品列表（创建用）
  selectedProducts: new Set(),
  expandedTask: null,  // 当前展开的任务 record_id
};

/* ══════════════════════════════════════
   视图切换
   ══════════════════════════════════════ */
document.querySelectorAll('.vtab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.vtab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    S.currentView = btn.dataset.view;
    document.getElementById('panel' + capitalize(S.currentView)).classList.add('active');
    if (S.currentView === 'create' && !S.allProducts.length) loadProductsForPicker();
    if (S.currentView !== 'create') renderCurrentView();
  });
});

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ══════════════════════════════════════
   数据加载
   ══════════════════════════════════════ */
async function loadTasks() {
  try {
    const r = await fetch('/api/shoot/tasks?view=all');
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    S.allTasks = d.tasks || [];
    S.batches = d.batches || [];
    S.statusCounts = d.status_counts || {};
    updateCounts();
    renderCurrentView();
  } catch(e) {
    showToast('加载失败: ' + e.message);
  }
}

function updateCounts() {
  const sc = S.statusCounts;
  document.getElementById('countShoot').textContent = (sc['待拍']||0) + (sc['需补拍']||0);
  document.getElementById('countEdit').textContent = (sc['已拍']||0) + (sc['剪辑中']||0);
  document.getElementById('countReview').textContent = sc['待审核']||0;
  document.getElementById('countAll').textContent = S.allTasks.length;
}

function filterTasks(statuses) {
  let tasks = S.allTasks.filter(t => statuses.includes(t.status));
  if (S.batchFilter) tasks = tasks.filter(t => t.batch === S.batchFilter);
  return tasks;
}

function renderCurrentView() {
  switch(S.currentView) {
    case 'shoot': renderShootView(); break;
    case 'edit': renderEditView(); break;
    case 'review': renderReviewView(); break;
    case 'all': renderAllView(); break;
  }
}

/* ══════════════════════════════════════
   拍摄视图
   ══════════════════════════════════════ */
function renderShootView() {
  const tasks = filterTasks(['待拍', '需补拍']);
  const sc = S.statusCounts;
  document.getElementById('shootStats').innerHTML = `
    <div class="stat-item"><div class="s-val">${sc['待拍']||0}</div><div class="s-label">待拍</div></div>
    <div class="stat-item"><div class="s-val">${sc['需补拍']||0}</div><div class="s-label">需补拍</div></div>
    <div class="stat-item"><div class="s-val">${sc['已拍']||0}</div><div class="s-label">已拍</div></div>
    <div class="stat-item"><div class="s-val">${sc['已完成']||0}</div><div class="s-label">已完成</div></div>
  `;
  renderBatchChips('shootBatches', ['待拍','需补拍']);
  renderTaskList('shootList', tasks, 'shoot');
}

function renderEditView() {
  const tasks = filterTasks(['已拍', '剪辑中']);
  renderTaskList('editList', tasks, 'edit');
}

function renderReviewView() {
  const tasks = filterTasks(['待审核']);
  renderTaskList('reviewList', tasks, 'review');
}

function renderAllView() {
  const sc = S.statusCounts;
  document.getElementById('allStats').innerHTML = `
    <div class="stat-item"><div class="s-val">${S.allTasks.length}</div><div class="s-label">总计</div></div>
    <div class="stat-item"><div class="s-val">${sc['待拍']||0}</div><div class="s-label">待拍</div></div>
    <div class="stat-item"><div class="s-val">${sc['已拍']||0}</div><div class="s-label">已拍</div></div>
    <div class="stat-item"><div class="s-val">${sc['剪辑中']||0}</div><div class="s-label">剪辑中</div></div>
    <div class="stat-item"><div class="s-val">${sc['已完成']||0}</div><div class="s-label">已完成</div></div>
  `;
  let tasks = S.allTasks;
  if (S.batchFilter) tasks = tasks.filter(t => t.batch === S.batchFilter);
  renderBatchChips('allBatches', null);
  renderTaskList('allList', tasks, 'all');
}

/* ══════════════════════════════════════
   批次筛选 Chips
   ══════════════════════════════════════ */
function renderBatchChips(containerId, statuses) {
  const container = document.getElementById(containerId);
  let relevantBatches;
  if (statuses) {
    const bset = new Set();
    S.allTasks.forEach(t => { if(statuses.includes(t.status)) bset.add(t.batch); });
    relevantBatches = [...bset].sort().reverse();
  } else {
    relevantBatches = S.batches;
  }
  if (!relevantBatches.length) { container.innerHTML = ''; return; }

  let h = '';
  const curBatch = S.batchFilter;
  h += '<span class="batch-chip ' + (!curBatch?'active':'') + '" data-batch="">全部批次</span>';
  relevantBatches.forEach(b => {
    h += '<span class="batch-chip ' + (curBatch===b?'active':'') + '" data-batch="' + b + '">' + b + '</span>';
  });
  container.innerHTML = h;
  container.querySelectorAll('.batch-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      S.batchFilter = chip.dataset.batch;
      container.querySelectorAll('.batch-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      // 只刷新任务列表，不重建整个视图
      if (S.currentView === 'shoot') {
        const tasks = filterTasks(['待拍','需补拍']);
        renderTaskList('shootList', tasks, 'shoot');
      } else if (S.currentView === 'all') {
        let tasks = S.allTasks;
        if (S.batchFilter) tasks = tasks.filter(t => t.batch === S.batchFilter);
        renderTaskList('allList', tasks, 'all');
      }
    });
  });
}

/* ══════════════════════════════════════
   任务列表渲染
   ══════════════════════════════════════ */
function renderTaskList(containerId, tasks, mode) {
  const box = document.getElementById(containerId);
  if (!tasks.length) {
    box.innerHTML = '<div class="empty-state">暂无任务</div>';
    return;
  }
  box.innerHTML = tasks.map(t => {
    const isExpanded = S.expandedTask === t.record_id;
    return `
    <div class="task-card fade-in" id="task-${t.record_id}">
      <div class="task-main" onclick="toggleTaskDetail('${t.record_id}')">
        <img class="task-thumb" src="${t.product_image||''}" alt="" onerror="this.style.background='#e2e8f0'">
        <div class="task-info">
          <div class="t-sku">${t.sku} · ${t.media_type}</div>
          <div class="t-name">${t.product_name_zh || t.product_name || t.sku}</div>
          <div class="t-meta">
            <span class="badge badge-${t.status}">${t.status}</span>
            ${t.shooter ? '<span>📷 '+t.shooter+'</span>' : ''}
            ${t.editor ? '<span>✂️ '+t.editor+'</span>' : ''}
          </div>
        </div>
        ${renderQuickAction(t, mode)}
      </div>
      <div class="task-detail ${isExpanded?'open':''}" id="detail-${t.record_id}">
        ${renderTaskDetail(t, mode)}
      </div>
    </div>`;
  }).join('');
}

function renderQuickAction(t, mode) {
  if (mode === 'shoot') {
    if (t.status === '待拍' || t.status === '需补拍') {
      return '<button class="quick-action done" onclick="event.stopPropagation();shootMark(\'' + t.record_id + '\',\'' + t.sku + '\')" title="标记已拍">✓</button>';
    }
  }
  if (mode === 'edit') {
    if (t.status === '已拍') {
      return '<button class="quick-action check" onclick="event.stopPropagation();quickMark(\'' + t.record_id + '\',\'剪辑中\')" title="开始剪辑">✂</button>';
    }
  }
  if (mode === 'review') {
    return '<button class="quick-action done" onclick="event.stopPropagation();approveTask(\'' + t.record_id + '\')" title="审核通过">✓</button>';
  }
  return '';
}

function renderTaskDetail(t, mode) {
  let html = '';

  // 通用：备注
  html += `<div class="detail-row">
    <label>备注</label>
    <input type="text" value="${t.note||''}" id="note-${t.record_id}" placeholder="输入备注">
  </div>`;

  if (mode === 'shoot' || mode === 'all') {
    html += `<div class="detail-row">
      <label>拍摄人</label>
      <input type="text" value="${t.shooter||''}" id="shooter-${t.record_id}" placeholder="拍摄人">
    </div>`;
  }

  if (mode === 'edit' || mode === 'all') {
    html += `<div class="detail-row">
      <label>剪辑师</label>
      <input type="text" value="${t.editor||''}" id="editor-${t.record_id}" placeholder="剪辑师">
    </div>`;
    html += `<div class="detail-row">
      <label>成品</label>
      <input type="url" value="${t.result_link||''}" id="link-${t.record_id}" placeholder="粘贴 CDN 链接">
    </div>`;
  }

  if (mode === 'review') {
    if (t.result_link) {
      const isVideo = /\.(mp4|webm|mov)/i.test(t.result_link);
      html += `<div class="review-preview">
        ${isVideo
          ? `<video src="${t.result_link}" controls playsinline preload="metadata"></video>`
          : `<img src="${t.result_link}" alt="preview">`}
        <div class="review-link">${t.result_link}</div>
      </div>`;
    }
    html += `<div class="detail-row">
      <label>回写</label>
      <input type="text" value="${t.write_target||''}" disabled style="background:#f1f5f9">
    </div>`;
  }

  // 状态切换（所有模式都有）
  if (mode === 'all') {
    html += `<div class="detail-row">
      <label>状态</label>
      <select id="status-${t.record_id}">
        ${['待拍','已拍','剪辑中','待审核','已完成','需补拍'].map(s =>
          `<option value="${s}" ${t.status===s?'selected':''}>${s}</option>`
        ).join('')}
      </select>
    </div>`;
  }

  // 操作按钮
  html += '<div class="detail-btns">';
  if (mode === 'shoot') {
    html += `<button class="btn btn-sm btn-warn" onclick="quickMark('${t.record_id}','需补拍')">需补拍</button>`;
    html += `<button class="btn btn-sm btn-success" onclick="saveTaskDetail('${t.record_id}','shoot')">保存</button>`;
  } else if (mode === 'edit') {
    html += `<button class="btn btn-sm btn-primary" onclick="saveTaskDetail('${t.record_id}','edit')">保存并提交审核</button>`;
  } else if (mode === 'review') {
    html += `<button class="btn btn-sm btn-danger" onclick="quickMark('${t.record_id}','需补拍')">打回补拍</button>`;
    html += `<button class="btn btn-sm btn-success" onclick="approveTask('${t.record_id}')">通过并回写</button>`;
  } else {
    html += `<button class="btn btn-sm btn-primary" onclick="saveTaskDetail('${t.record_id}','all')">保存</button>`;
  }
  html += '</div>';

  return html;
}

/* ══════════════════════════════════════
   任务交互
   ══════════════════════════════════════ */
function toggleTaskDetail(rid) {
  if (S.expandedTask === rid) {
    S.expandedTask = null;
    const el = document.getElementById('detail-' + rid);
    if (el) el.classList.remove('open');
  } else {
    // 关闭上一个
    if (S.expandedTask) {
      const prev = document.getElementById('detail-' + S.expandedTask);
      if (prev) prev.classList.remove('open');
    }
    S.expandedTask = rid;
    const el = document.getElementById('detail-' + rid);
    if (el) el.classList.add('open');
  }
}

let _undoTimer = null;
let _undoBar = null;

function shootMark(rid, sku) {
  const task = S.allTasks.find(t => t.record_id === rid);
  if (!task) return;
  const oldStatus = task.status;
  const cardEl = document.getElementById('task-' + rid);
  if (!cardEl) return;

  // 第一步：圆圈变实心绿色打勾
  cardEl.classList.add('completed');
  const badge = cardEl.querySelector('.badge');
  if (badge) { badge.textContent = '已拍'; badge.className = 'badge badge-已拍'; }

  // 第二步：0.6秒后向右滑出
  setTimeout(() => { cardEl.classList.add('sliding-out'); }, 600);

  // 第三步：滑出后折叠高度
  setTimeout(() => { cardEl.classList.add('collapsed'); }, 1000);

  // 更新数据
  task.status = '已拍';
  S.statusCounts[oldStatus] = (S.statusCounts[oldStatus]||1) - 1;
  S.statusCounts['已拍'] = (S.statusCounts['已拍']||0) + 1;
  updateCounts();

  // 显示撤回条
  showUndo(sku, () => {
    // 撤回：恢复状态
    task.status = oldStatus;
    S.statusCounts['已拍'] = (S.statusCounts['已拍']||1) - 1;
    S.statusCounts[oldStatus] = (S.statusCounts[oldStatus]||0) + 1;
    updateCounts();
    renderCurrentView();
    // 撤回飞书
    fetch('/api/shoot/task/' + rid + '/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({status: oldStatus})
    }).catch(() => {});
  });

  // 异步写飞书
  fetch('/api/shoot/task/' + rid + '/update', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({status:'已拍'})
  }).then(r => r.json()).then(d => {
    if (!d.ok) throw new Error(d.error);
  }).catch(e => {
    showToast('同步失败: ' + e.message);
    task.status = oldStatus;
    S.statusCounts['已拍'] = (S.statusCounts['已拍']||1) - 1;
    S.statusCounts[oldStatus] = (S.statusCounts[oldStatus]||0) + 1;
    updateCounts();
    renderCurrentView();
  });

  // 3.5秒后如果没撤回，从DOM彻底移除并刷新列表
  setTimeout(() => {
    if (task.status === '已拍') renderCurrentView();
  }, 3500);
}

function showUndo(sku, undoFn) {
  // 移除旧的撤回条
  if (_undoBar) { _undoBar.remove(); _undoBar = null; }
  clearTimeout(_undoTimer);

  const bar = document.createElement('div');
  bar.className = 'undo-bar';
  bar.innerHTML = '<span>' + sku + ' 已拍 ✓</span><button>撤回</button>';
  document.body.appendChild(bar);
  _undoBar = bar;

  bar.querySelector('button').addEventListener('click', () => {
    bar.remove(); _undoBar = null;
    clearTimeout(_undoTimer);
    undoFn();
  });

  _undoTimer = setTimeout(() => {
    if (bar.parentNode) bar.remove();
    _undoBar = null;
  }, 3500);
}

async function quickMark(rid, status) {
  const task = S.allTasks.find(t => t.record_id === rid);
  if (!task) return;
  const oldStatus = task.status;

  task.status = status;
  S.statusCounts[oldStatus] = (S.statusCounts[oldStatus]||1) - 1;
  S.statusCounts[status] = (S.statusCounts[status]||0) + 1;
  updateCounts();
  renderCurrentView();
  showToast(task.sku + ' → ' + status);

  try {
    const r = await fetch('/api/shoot/task/' + rid + '/update', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({status: status})
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
  } catch(e) {
    showToast('同步失败: ' + e.message);
    task.status = oldStatus;
    S.statusCounts[status] = (S.statusCounts[status]||1) - 1;
    S.statusCounts[oldStatus] = (S.statusCounts[oldStatus]||0) + 1;
    updateCounts();
    renderCurrentView();
  }
}

async function saveTaskDetail(rid, mode) {
  const body = {};
  const noteEl = document.getElementById('note-' + rid);
  if (noteEl) body.note = noteEl.value.trim();

  const shooterEl = document.getElementById('shooter-' + rid);
  if (shooterEl) body.shooter = shooterEl.value.trim();

  const editorEl = document.getElementById('editor-' + rid);
  if (editorEl) body.editor = editorEl.value.trim();

  const linkEl = document.getElementById('link-' + rid);
  if (linkEl) body.result_link = linkEl.value.trim();

  const statusEl = document.getElementById('status-' + rid);
  if (statusEl) body.status = statusEl.value;

  // 剪辑模式保存时自动提交审核
  if (mode === 'edit') {
    if (body.result_link) {
      body.status = '待审核';
    } else {
      showToast('请先填入成品链接');
      return;
    }
  }

  try {
    const r = await fetch(`/api/shoot/task/${rid}/update`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    showToast('已保存');
    await loadTasks();
  } catch(e) {
    showToast('保存失败: ' + e.message);
  }
}

async function approveTask(rid) {
  showToast('审核中…');
  try {
    const r = await fetch(`/api/shoot/task/${rid}/approve`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: '{}'
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    showToast(d.msg);
    await loadTasks();
  } catch(e) {
    showToast('审核失败: ' + e.message);
  }
}

/* ══════════════════════════════════════
   新建批次 — 产品选择器
   ══════════════════════════════════════ */
async function loadProductsForPicker() {
  try {
    const r = await fetch('/api/products');
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    S.allProducts = d.products || [];
    renderPicker();
  } catch(e) {
    document.getElementById('pickerGrid').innerHTML = '<div class="empty-state">加载失败</div>';
  }
}

function renderPicker(keyword) {
  const grid = document.getElementById('pickerGrid');
  let prods = S.allProducts;
  if (keyword) {
    const kw = keyword.toLowerCase();
    prods = prods.filter(p => (p.sku + ' ' + (p.name_zh||'') + ' ' + p.name).toLowerCase().includes(kw));
  }
  if (!prods.length) { grid.innerHTML = '<div class="empty-state">无匹配产品</div>'; return; }

  grid.innerHTML = prods.map(p => {
    const sel = S.selectedProducts.has(p.record_id);
    return `<div class="picker-item ${sel?'selected':''}" onclick="togglePick('${p.record_id}')">
      <img class="pi-thumb" src="${p.image_url||''}" alt="" onerror="this.style.background='#e2e8f0'" loading="lazy">
      <div class="pi-info">
        <div class="pi-sku">${p.sku} · ${p.category_zh||''}</div>
        <div class="pi-name">${p.name_zh || p.name}</div>
      </div>
      <div class="pi-check">${sel?'✓':''}</div>
    </div>`;
  }).join('');
}

function togglePick(rid) {
  if (S.selectedProducts.has(rid)) {
    S.selectedProducts.delete(rid);
  } else {
    S.selectedProducts.add(rid);
  }
  document.getElementById('pickerSelectedCount').textContent = S.selectedProducts.size;
  // 更新单个 item 而不是整个列表（性能优化）
  const items = document.querySelectorAll('.picker-item');
  items.forEach(el => {
    const itemRid = el.getAttribute('onclick').match(/'([^']+)'/)[1];
    if (itemRid === rid) {
      el.classList.toggle('selected');
      el.querySelector('.pi-check').textContent = el.classList.contains('selected') ? '✓' : '';
    }
  });
}

let _pickerSearchTimer = null;
document.getElementById('pickerSearch').addEventListener('input', e => {
  clearTimeout(_pickerSearchTimer);
  _pickerSearchTimer = setTimeout(() => renderPicker(e.target.value.trim()), 200);
});

/* ══════════════════════════════════════
   创建批次
   ══════════════════════════════════════ */
document.getElementById('btnCreateBatch').addEventListener('click', async () => {
  const batchName = document.getElementById('inputBatchName').value.trim();
  const mediaTypes = [...document.querySelectorAll('.media-type-cb:checked')].map(cb => cb.value);
  const productRids = [...S.selectedProducts];

  if (!batchName) { showToast('请输入批次名称'); return; }
  if (!mediaTypes.length) { showToast('请至少选择一种素材类型'); return; }
  if (!productRids.length) { showToast('请选择至少一个产品'); return; }

  const btn = document.getElementById('btnCreateBatch');
  btn.disabled = true; btn.textContent = `创建中（${productRids.length} × ${mediaTypes.length} = ${productRids.length * mediaTypes.length} 条）…`;

  try {
    const r = await fetch('/api/shoot/create-batch', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        batch_name: batchName,
        product_record_ids: productRids,
        media_types: mediaTypes,
      })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    showToast(d.msg);

    // 重置表单
    S.selectedProducts.clear();
    document.getElementById('pickerSelectedCount').textContent = '0';
    document.getElementById('inputBatchName').value = '';
    renderPicker();

    // 切到拍摄视图
    await loadTasks();
    document.querySelector('.vtab[data-view="shoot"]').click();
  } catch(e) {
    showToast('创建失败: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '创建拍摄任务';
  }
});

/* ══════════════════════════════════════
   工具函数
   ══════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ══════════════════════════════════════
   初始化
   ══════════════════════════════════════ */
loadTasks();
</script>
