<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ProvenLift 业务员中台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;--card:#fff;--primary:#2563eb;--primary-hover:#1d4ed8;--primary-light:#eff6ff;
  --success:#16a34a;--success-light:#f0fdf4;--danger:#dc2626;--danger-light:#fef2f2;
  --text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --tab-h:56px;--header-h:52px;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;
  min-height:100dvh;padding-bottom:var(--tab-h);
}

/* ── Header ── */
.app-header{
  background:var(--primary);color:#fff;padding:0 16px;height:var(--header-h);
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 8px rgba(37,99,235,.3);
}
.app-header h1{font-size:1rem;font-weight:600}
.header-actions{display:flex;align-items:center;gap:10px}
.btn-refresh{
  background:rgba(255,255,255,.2);border:none;color:#fff;
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
}
.btn-refresh:active{background:rgba(255,255,255,.3)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block}

/* ── Bottom Tabs ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);
  background:#fff;border-top:1px solid var(--border);
  display:flex;z-index:100;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:none;background:none;color:var(--text3);font-size:.625rem;
  font-weight:500;cursor:pointer;gap:2px;transition:color .2s;
}
.tab-btn.active{color:var(--primary)}
.tab-icon{font-size:1.25rem}

/* ── Views ── */
.view{display:none;padding:12px;max-width:600px;margin:0 auto}
.view.active{display:block}

/* ── Cards ── */
.card{
  background:var(--card);border-radius:var(--radius);padding:16px;
  margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border);
}
.card-title{font-size:.75rem;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}

/* ── Sub Tabs (模板/客户方案切换) ── */
.sub-tabs{display:flex;gap:0;margin-bottom:12px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--border)}
.sub-tab{
  flex:1;padding:8px 0;text-align:center;border-radius:8px;
  font-size:.8125rem;font-weight:600;cursor:pointer;
  border:none;background:none;color:var(--text2);transition:all .2s;
}
.sub-tab.active{background:var(--primary);color:#fff}

/* ── Plan Item (列表中的方案卡片) ── */
.plan-item{
  padding:12px;border-radius:10px;border:1px solid var(--border);
  margin-bottom:8px;cursor:pointer;transition:all .15s;
}
.plan-item:active{background:#f8fafc;transform:scale(.98)}
.plan-item .plan-name{font-size:.9375rem;font-weight:600;margin-bottom:4px}
.plan-item .plan-meta{font-size:.75rem;color:var(--text2);display:flex;gap:12px;flex-wrap:wrap}
.plan-item .plan-cats{font-size:.6875rem;color:var(--text3);margin-top:6px}
.plan-item .plan-action{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:8px;padding:6px 12px;border-radius:6px;
  background:var(--primary-light);color:var(--primary);
  font-size:.75rem;font-weight:600;border:none;cursor:pointer;
}
.plan-item .plan-action:active{background:#dbeafe}

/* ── Edit View (方案编辑态) ── */
.edit-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.btn-back{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.125rem;flex-shrink:0;
}
.edit-title{font-size:1rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.summary-item{text-align:center;padding:10px 4px;background:#f8fafc;border-radius:8px}
.summary-item .s-val{font-size:1.125rem;font-weight:700;color:var(--text)}
.summary-item .s-label{font-size:.625rem;color:var(--text2);margin-top:2px}

/* ── Product List (方案内器材) ── */
.cat-group{margin-bottom:12px}
.cat-group-title{
  font-size:.75rem;font-weight:600;color:var(--text2);
  padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:6px;
  display:flex;align-items:center;gap:6px;
}
.cat-arrow{font-size:.625rem;color:var(--text3);transition:transform .2s;display:inline-block;width:12px}
.cat-group-title .cat-count{
  background:var(--primary-light);color:var(--primary);
  font-size:.625rem;padding:2px 6px;border-radius:4px;
}
.prod-row{
  display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid #f1f5f9;
}
.prod-row:last-child{border-bottom:none}
.prod-thumb{
  width:52px;height:52px;border-radius:8px;object-fit:cover;
  background:#f1f5f9;flex-shrink:0;
}
.prod-info{flex:1;min-width:0}
.prod-info .p-sku{font-size:.6875rem;color:var(--text3)}
.prod-info .p-name{font-size:.8125rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prod-info .p-price{font-size:.75rem;color:var(--primary);font-weight:600}
.btn-remove{
  width:32px;height:32px;border-radius:8px;border:none;
  background:var(--danger-light);color:var(--danger);
  font-size:1rem;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.btn-remove:active{background:#fecaca}

/* ── Bottom Action Bar (固定底栏) ── */
.action-bar{
  position:fixed;bottom:var(--tab-h);left:0;right:0;
  background:#fff;border-top:1px solid var(--border);
  padding:8px 12px;display:none;z-index:90;
  max-width:600px;margin:0 auto;
}
.action-bar.active{display:flex;gap:8px;align-items:center}
.action-bar .action-info{flex:1;font-size:.75rem;color:var(--text2)}
.action-bar .action-info strong{color:var(--text);font-size:.875rem}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border:none;border-radius:8px;
  font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-primary:disabled{background:#94a3b8;cursor:not-allowed;transform:none}
.btn-success{background:var(--success);color:#fff}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}

/* ── Product Grid (产品总库) ── */
.filter-bar{
  position:sticky;top:var(--header-h);z-index:50;
  background:var(--bg);padding:8px 0 4px;
}
.search-box{
  width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;
  font-size:.9375rem;background:var(--card);margin-bottom:8px;
}
.search-box:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.filter-row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.chip{
  padding:6px 12px;border-radius:16px;font-size:.75rem;font-weight:500;
  border:1.5px solid var(--border);background:var(--card);color:var(--text2);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;
}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.editing-banner{
  background:var(--primary-light);color:var(--primary);
  padding:8px 12px;border-radius:8px;font-size:.8125rem;font-weight:500;
  margin-bottom:8px;text-align:center;
}
.editing-banner.warn{background:#fffbeb;color:#b45309}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.product-card{
  background:var(--card);border-radius:10px;overflow:hidden;
  border:1px solid var(--border);position:relative;
  transition:all .15s;
}
.product-card:active{transform:scale(.97)}
.product-card .pc-img{
  width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f1f5f9;
}
.product-card .pc-body{padding:8px}
.product-card .pc-sku{font-size:.625rem;color:var(--text3)}
.product-card .pc-name{font-size:.75rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-card .pc-price{font-size:.75rem;color:var(--primary);font-weight:600;margin-top:2px}
.pc-action{
  position:absolute;top:6px;right:6px;width:30px;height:30px;
  border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.875rem;font-weight:700;transition:all .15s;
}
.pc-action.add{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(37,99,235,.4)}
.pc-action.added{background:var(--success);color:#fff;box-shadow:0 2px 6px rgba(22,163,74,.4)}

/* ── History ── */
.history-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid var(--border);gap:10px;
}
.history-item:last-child{border-bottom:none}
.history-meta{flex:1;min-width:0}
.history-meta .h-plan{font-size:.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-meta .h-time{font-size:.75rem;color:var(--text2)}
.history-actions{display:flex;gap:6px;flex-shrink:0}
.btn-sm{
  padding:6px 12px;border-radius:6px;font-size:.75rem;font-weight:600;
  border:none;cursor:pointer;white-space:nowrap;
}
.btn-sm.copy{background:var(--primary-light);color:var(--primary)}
.btn-sm.open{background:var(--success-light);color:var(--success)}
.empty-state{text-align:center;padding:32px 16px;color:var(--text3);font-size:.875rem}

/* ── Modal ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;
  align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.active{display:flex}
.modal-box{
  background:var(--card);border-radius:var(--radius);padding:20px;
  width:100%;max-width:360px;
}
.modal-box h3{font-size:1rem;font-weight:600;margin-bottom:12px}
.modal-box input{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:.9375rem;margin-bottom:12px;
}
.modal-box input:focus{outline:none;border-color:var(--primary)}
.modal-btns{display:flex;gap:8px}
.modal-btns .btn{flex:1}

/* ── Toast ── */
.toast{
  position:fixed;bottom:calc(var(--tab-h) + 60px);left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#1e293b;color:#fff;padding:10px 24px;border-radius:20px;
  font-size:.8125rem;font-weight:500;opacity:0;transition:all .3s;
  z-index:999;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Loading ── */
.loading{text-align:center;padding:40px;color:var(--text3)}
.spinner{
  width:20px;height:20px;border:2.5px solid rgba(37,99,235,.2);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin .6s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}

/* ── Log box ── */
.log-box{
  background:#1e293b;color:#e2e8f0;border-radius:8px;padding:12px;
  font-family:"SF Mono",Monaco,Consolas,monospace;font-size:.6875rem;
  max-height:160px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;
  display:none;margin-top:10px;
}
.log-box.active{display:block}
.result-url{
  background:var(--success-light);border:1.5px solid #86efac;border-radius:8px;
  padding:12px;font-size:.8125rem;word-break:break-all;color:var(--text);margin:10px 0;
}
.result-url.error{background:var(--danger-light);border-color:#fca5a5;color:var(--danger)}
.result-btns{display:flex;gap:8px}
.result-btns .btn{flex:1;padding:8px 12px;font-size:.8125rem}

/* ── Detail Sheet ── */
.detail-overlay{
  display:none;position:fixed;inset:0;z-index:200;
}
.detail-overlay.active{display:block}
.detail-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.detail-sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--card);border-radius:16px 16px 0 0;
  max-height:85vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s ease;
}
.detail-overlay.active .detail-sheet{transform:translateY(0)}
.detail-handle{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:8px auto}
.detail-scroll{flex:1;overflow-y:auto;padding:0 16px 24px;-webkit-overflow-scrolling:touch}
.detail-media{position:relative;border-radius:10px;overflow:hidden;margin-bottom:12px;background:#f1f5f9}
.detail-media img,.detail-media video{width:100%;display:block;max-height:240px;object-fit:cover}
.detail-video-badge{
  position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);color:#fbbf24;
  font-size:.6875rem;font-weight:600;padding:3px 8px;border-radius:4px;
}
.detail-name{font-size:1rem;font-weight:600;margin-bottom:2px}
.detail-sku{font-size:.75rem;color:var(--text3);margin-bottom:10px}
.detail-prices{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;
}
.detail-price-box{
  padding:10px;border-radius:8px;text-align:center;
}
.detail-price-box.cost{background:#fef3c7;border:1px solid #fde68a}
.detail-price-box.sell{background:var(--primary-light);border:1px solid #bfdbfe}
.detail-price-box .dp-label{font-size:.625rem;color:var(--text2);margin-bottom:2px}
.detail-price-box .dp-val{font-size:1.125rem;font-weight:700}
.detail-price-box.cost .dp-val{color:#b45309}
.detail-price-box.sell .dp-val{color:var(--primary)}
.detail-price-sub{font-size:.6875rem;color:var(--text3);text-align:center;margin:-6px 0 12px}
.detail-specs{margin-bottom:12px}
.detail-spec-row{
  display:flex;justify-content:space-between;padding:8px 0;
  border-bottom:1px solid #f1f5f9;font-size:.8125rem;
}
.detail-spec-row:last-child{border-bottom:none}
.detail-spec-key{color:var(--text2)}
.detail-spec-val{font-weight:500;text-align:right}
.detail-muscles{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.detail-muscle-tag{
  padding:3px 8px;border-radius:12px;font-size:.6875rem;
  background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;
}
.detail-close{
  position:absolute;top:12px;right:16px;width:32px;height:32px;
  border-radius:50%;border:none;background:#f1f5f9;
  font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
</style>
</head>
<body>

<!-- ══════ Header ══════ -->
<header class="app-header">
  <h1>ProvenLift 业务中台</h1>
  <div class="header-actions">
    <button class="btn-refresh" onclick="refreshCache()" title="刷新数据">↻</button>
    <span class="status-dot"></span>
  </div>
</header>

<!-- ══════ View 1: 方案管理 ══════ -->
<div id="viewPlans" class="view active">

  <!-- 列表模式 -->
  <div id="planListMode">
    <div class="sub-tabs">
      <button class="sub-tab active" data-sub="templates">套餐模板</button>
      <button class="sub-tab" data-sub="clients">客户方案</button>
    </div>
    <div id="subTemplates" class="fade-in">
      <div class="loading"><span class="spinner"></span> 加载中…</div>
    </div>
    <div id="subClients" style="display:none" class="fade-in">
      <div class="loading"><span class="spinner"></span> 加载中…</div>
    </div>
  </div>

  <!-- 编辑模式（选中某个客户方案后） -->
  <div id="planEditMode" style="display:none">
    <div class="edit-header">
      <button class="btn-back" onclick="exitEditMode()">←</button>
      <div class="edit-title" id="editTitle">—</div>
    </div>
    <div class="summary-grid" id="editSummary"></div>
    <div class="card" id="editProductList">
      <div class="card-title">当前器材清单</div>
      <div class="loading"><span class="spinner"></span></div>
    </div>

    <!-- 生成区域 -->
    <div class="card" id="generateCard">
      <div class="card-title">生成客户网页</div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="btn btn-outline" id="btnGenerate" style="flex:1">
          <span id="btnGenText">生成预览</span>
        </button>
        <button class="btn btn-primary" id="btnDeploy" style="flex:1" disabled>
          <span id="btnDeployText">发给客户</span>
        </button>
      </div>
      <div id="genResult" style="display:none">
        <div id="genResultUrl" class="result-url"></div>
        <div class="result-btns">
          <button class="btn btn-outline" id="btnOpenUrl">本地预览</button>
          <button class="btn btn-success" id="btnCopyUrl" style="display:none">复制客户链接</button>
          <button class="btn btn-outline" id="btnOpenOnline" style="display:none">打开线上</button>
        </div>
      </div>
      <div id="genLog" class="log-box"></div>
    </div>
  </div>
</div>

<!-- ══════ View 2: 产品总库 ══════ -->
<div id="viewProducts" class="view">
  <div id="editingBanner" class="editing-banner warn">请先在「方案管理」中选择一个客户方案</div>
  <div class="filter-bar">
    <input type="text" class="search-box" id="searchInput" placeholder="搜索 SKU 或中文名…">
    <div class="filter-row" id="catFilters"></div>
    <div class="filter-row" id="muscleFilters"></div>
  </div>
  <div class="product-grid" id="productGrid">
    <div class="loading" style="grid-column:1/-1"><span class="spinner"></span> 加载产品…</div>
  </div>
</div>

<!-- ══════ View 3: 历史记录 ══════ -->
<div id="viewHistory" class="view">
  <div class="card">
    <div class="card-title">生成历史</div>
    <div id="historyList"><div class="empty-state">暂无记录</div></div>
  </div>
</div>

<!-- ══════ Bottom Tabs ══════ -->
<nav class="tab-bar">
  <button class="tab-btn active" data-view="viewPlans">
    <span class="tab-icon">📋</span>方案
  </button>
  <button class="tab-btn" data-view="viewProducts">
    <span class="tab-icon">🏋️</span>选品
  </button>
  <button class="tab-btn" data-view="viewHistory">
    <span class="tab-icon">📁</span>历史
  </button>
</nav>

<!-- ══════ Modal: 新建客户方案 ══════ -->
<div class="modal-overlay" id="modalCreate">
  <div class="modal-box">
    <h3>新建客户方案</h3>
    <div style="font-size:.8125rem;color:var(--text2);margin-bottom:10px" id="modalTplName"></div>
    <input type="text" id="inputClientName" placeholder="输入客户名称（如 ProGym KL）">
    <div style="margin-bottom:12px">
      <label style="font-size:.75rem;font-weight:600;color:var(--text2);display:block;margin-bottom:4px">目标市场</label>
      <select id="inputMarket" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9375rem;background:var(--card);color:var(--text);appearance:auto">
        <option value="">未指定</option>
        <option value="MY">马来西亚 MY</option>
        <option value="AU">澳洲 AU</option>
        <option value="NZ">新西兰 NZ</option>
        <option value="CA">加拿大 CA</option>
      </select>
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:.75rem;font-weight:600;color:var(--text2);display:block;margin-bottom:4px">适用面积 (m²)</label>
      <input type="number" id="inputArea" placeholder="如 400" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9375rem">
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="btnConfirmCreate">创建</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   全局状态
   ══════════════════════════════════════ */
let STATE = {
  templates: [],
  clientPlans: [],
  editingPlan: null,
  editingDetail: null,
  editingSkuSet: new Set(),
  allProducts: [],
  filterOptions: { categories: [], muscles: [] },
  activeCategory: '',
  activeMuscle: '',
  fx: { rates: {MYR:0.5786,AUD:0.2101,NZD:0.2521,CAD:0.2002,USD:0.1445}, symbols: {MYR:'RM',AUD:'A$',NZD:'NZ$',CAD:'C$',USD:'$'}, marketCurrency: {'MY':'MYR','AU':'AUD','NZ':'NZD','CA':'CAD','':'USD'}, dateLabel: '' },
};

// 汇率加载
async function loadFxRates() {
  try {
    const r = await fetch('/api/exchange-rates');
    const d = await r.json();
    if (d.ok) {
      STATE.fx.rates = d.rates;
      STATE.fx.symbols = d.symbols;
      STATE.fx.marketCurrency = d.market_currency;
      STATE.fx.dateLabel = d.date_label || '';
    }
  } catch(e) {}
}
// 根据当前编辑方案的市场返回货币信息
function getCurrency() {
  const market = (STATE.editingDetail && STATE.editingDetail.market) || '';
  const code = STATE.fx.marketCurrency[market] || 'USD';
  const symbol = STATE.fx.symbols[code] || '$';
  const rate = STATE.fx.rates[code] || 0.1445;
  return { code, symbol, rate };
}
// RMB → 当地货币
function toLocal(rmb) {
  const { rate } = getCurrency();
  return Math.round(rmb * rate);
}
function fmtLocal(rmb) {
  const { symbol } = getCurrency();
  return symbol + toLocal(rmb).toLocaleString();
}

/* ══════════════════════════════════════
   Tab 切换
   ══════════════════════════════════════ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.view).classList.add('active');
    // 切到产品库时自动加载
    if (btn.dataset.view === 'viewProducts' && !STATE.allProducts.length) {
      loadProducts();
      loadFilterOptions();
    }
  });
});

/* Sub-tabs */
document.querySelectorAll('.sub-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const show = btn.dataset.sub === 'templates' ? 'subTemplates' : 'subClients';
    const hide = btn.dataset.sub === 'templates' ? 'subClients' : 'subTemplates';
    document.getElementById(show).style.display = 'block';
    document.getElementById(hide).style.display = 'none';
  });
});

/* ══════════════════════════════════════
   数据加载
   ══════════════════════════════════════ */
async function loadPlans(silent) {
  // 非静默模式：先尝试渲染 localStorage 缓存
  if (!silent) {
    try {
      const cached = localStorage.getItem('admin_plans_cache');
      if (cached) {
        const c = JSON.parse(cached);
        STATE.templates = c.templates || [];
        STATE.clientPlans = c.client_plans || [];
        renderTemplates();
        renderClientPlans();
      }
    } catch(e) {}
  }

  // 后台拉取最新数据
  try {
    const r = await fetch('/api/plans');
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    STATE.templates = d.templates || [];
    STATE.clientPlans = d.client_plans || [];
    // 写入缓存
    try { localStorage.setItem('admin_plans_cache', JSON.stringify(d)); } catch(e) {}
    renderTemplates();
    renderClientPlans();
  } catch(e) {
    // 如果已有缓存渲染，静默失败；否则显示错误
    if (!STATE.templates.length && !STATE.clientPlans.length) {
      document.getElementById('subTemplates').innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`;
    }
  }
}

function renderTemplates() {
  const box = document.getElementById('subTemplates');
  if (!STATE.templates.length) { box.innerHTML = '<div class="empty-state">暂无套餐模板</div>'; return; }
  box.innerHTML = STATE.templates.map(t => {
    const cats = Object.entries(t.cat_counts||{}).map(([k,v])=>`${k}×${v}`).join(' / ');
    return `<div class="plan-item">
      <div class="plan-name">${t.plan_id} · ${t.client_name}</div>
      <div class="plan-meta">
        <span>${t.n_products}台</span><span>${t.area_m2||'—'}m²</span>
        <span>${t.market||'—'}</span><span>¥${(t.sell_total_rmb||0).toLocaleString()}</span>
      </div>
      ${cats ? `<div class="plan-cats">${cats}</div>` : ''}
      <button class="plan-action" onclick="openCreateModal('${t.record_id}','${t.plan_id} · ${t.client_name}','${t.market}','${t.area_m2}')">＋ 以此创建客户方案</button>
    </div>`;
  }).join('');
}

function renderClientPlans() {
  const box = document.getElementById('subClients');
  if (!STATE.clientPlans.length) { box.innerHTML = '<div class="empty-state">暂无客户方案，请从套餐模板创建</div>'; return; }
  box.innerHTML = STATE.clientPlans.map(p => {
    const cats = Object.entries(p.cat_counts||{}).map(([k,v])=>`${k}×${v}`).join(' / ');
    return `<div class="plan-item" onclick="enterEditMode('${p.record_id}')">
      <div class="plan-name">${p.client_name}</div>
      <div class="plan-meta">
        <span>${p.plan_id}</span><span>${p.n_products}台</span>
        <span>${p.market||'—'}</span><span>¥${(p.sell_total_rmb||0).toLocaleString()}</span>
      </div>
      ${cats ? `<div class="plan-cats">${cats}</div>` : ''}
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   创建客户方案 Modal
   ══════════════════════════════════════ */
let _createTplRid = '';

function openCreateModal(tplRid, tplName, tplMarket, tplArea) {
  _createTplRid = tplRid;
  document.getElementById('modalTplName').textContent = '基于模板: ' + tplName;
  document.getElementById('inputClientName').value = '';
  document.getElementById('inputMarket').value = (tplMarket || '').trim();
  document.getElementById('inputArea').value = (tplArea || '').trim();
  document.getElementById('modalCreate').classList.add('active');
  setTimeout(() => document.getElementById('inputClientName').focus(), 100);
}
function closeModal() {
  document.getElementById('modalCreate').classList.remove('active');
}

document.getElementById('btnConfirmCreate').addEventListener('click', async () => {
  const name = document.getElementById('inputClientName').value.trim();
  if (!name) { showToast('请输入客户名称'); return; }
  const market = document.getElementById('inputMarket').value;
  const areaVal = document.getElementById('inputArea').value.trim();
  const btn = document.getElementById('btnConfirmCreate');
  btn.disabled = true; btn.textContent = '创建中…';
  closeModal();
  showToast('正在创建方案…');

  try {
    const body = { template_record_id: _createTplRid, client_name: name };
    if (market) body.market = market;
    if (areaVal) body.area_m2 = parseFloat(areaVal);

    const r = await fetch('/api/client-plan/create', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    showToast('已创建: ' + d.plan_id);
    await loadPlans();
    document.querySelectorAll('.sub-tab')[1].click();
    setTimeout(() => enterEditMode(d.record_id), 100);
  } catch(e) {
    showToast('创建失败: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '创建';
  }
});

/* ══════════════════════════════════════
   编辑模式
   ══════════════════════════════════════ */
async function enterEditMode(recordId) {
  STATE.editingPlan = recordId;
  document.getElementById('planListMode').style.display = 'none';
  document.getElementById('planEditMode').style.display = 'block';
  document.getElementById('editProductList').innerHTML = '<div class="card-title">当前器材清单</div><div class="loading"><span class="spinner"></span> 加载中…</div>';
  document.getElementById('genResult').style.display = 'none';
  document.getElementById('genLog').classList.remove('active');

  try {
    const r = await fetch(`/api/client-plan/${recordId}`);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    STATE.editingDetail = d;
    STATE.editingSkuSet = new Set((d.products||[]).map(p=>p.record_id));
    renderEditView(d);
    updateEditingBanner();
  } catch(e) {
    showToast('加载方案详情失败: ' + e.message);
  }
}

function exitEditMode() {
  STATE.editingPlan = null;
  STATE.editingDetail = null;
  STATE.editingSkuSet.clear();
  document.getElementById('planEditMode').style.display = 'none';
  document.getElementById('planListMode').style.display = 'block';
  updateEditingBanner();
  loadPlans(); // 刷新列表
}

function renderEditView(d) {
  document.getElementById('editTitle').textContent = d.plan_id;

  // 摘要（双币 + 交期）
  const _cur = getCurrency();
  const _sellLocalTotal = Math.round((d.sell_total_rmb||0) * _cur.rate);
  const _rmbTotal = Math.round(d.sell_total_rmb||0);
  const _deliveryDate = d.override_delivery_date || d.auto_delivery_date || '';
  const _deliveryLabel = _deliveryDate ? _deliveryDate.replace(/^\d{4}-/, '').replace('-', '月') + '日' : '待定';
  const _deliveryAuto = !d.override_delivery_date && d.auto_delivery_date;
  document.getElementById('editSummary').innerHTML = `
    <div class="summary-item"><div class="s-val">${d.n_products}</div><div class="s-label">台器材</div></div>
    <div class="summary-item"><div class="s-val">¥${_rmbTotal.toLocaleString()}</div><div class="s-label" style="font-size:.6rem;line-height:1.3">${_cur.symbol}${_sellLocalTotal.toLocaleString()} ${_cur.code}</div></div>
    <div class="summary-item"><div class="s-val" style="font-size:${_deliveryLabel.length > 6 ? '.875rem' : '1.125rem'}">${_deliveryLabel}</div><div class="s-label">${_deliveryAuto ? '预估交期' : '交期'}</div></div>
  `;

  // ── 方案信息：折叠式卡片 ──
  let infoCard = document.getElementById('editInfoCard');
  if (!infoCard) {
    infoCard = document.createElement('div');
    infoCard.id = 'editInfoCard';
    infoCard.className = 'card';
    infoCard.style.cssText = 'padding:0;overflow:hidden';
    const prodList = document.getElementById('editProductList');
    prodList.parentNode.insertBefore(infoCard, prodList);
  }

  const MARKET_LABELS = {'MY':'马来西亚','AU':'澳洲','NZ':'新西兰','CA':'加拿大'};
  const marketLabel = MARKET_LABELS[d.market] || d.market || '未指定';
  const _freightRmb = d.override_freight_usd || 0;
  const _freightCur = getCurrency();
  const freightLabel = _freightRmb ? ('¥' + _freightRmb.toLocaleString() + ' / ' + _freightCur.symbol + Math.round(_freightRmb * _freightCur.rate).toLocaleString()) : '系统预估';

  const MARKET_OPTIONS = [
    {v:'', label:'未指定'},
    {v:'MY', label:'马来西亚 MY'},
    {v:'AU', label:'澳洲 AU'},
    {v:'NZ', label:'新西兰 NZ'},
    {v:'CA', label:'加拿大 CA'},
  ];
  const marketOpts = MARKET_OPTIONS.map(o =>
    `<option value="${o.v}" ${(d.market||'')===o.v?'selected':''}>${o.label}</option>`
  ).join('');
  const freightVal = d.override_freight_usd ? d.override_freight_usd : '';

  infoCard.innerHTML = `
    <div id="infoCardHeader" style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">
      <div style="font-size:.75rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em">方案信息</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:.75rem;color:var(--text3)">${d.area_m2||'—'}m² · 运费${freightLabel}</span>
        <span id="infoCardArrow" style="font-size:.75rem;color:var(--text3);transition:transform .2s">▼</span>
      </div>
    </div>
    <div id="infoCardBody" style="display:none;padding:0 16px 16px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <label style="font-size:.6875rem;color:var(--text2);display:block;margin-bottom:3px">目标市场</label>
          <select id="editMarket" style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:6px;font-size:.8125rem;background:var(--card)">
            ${marketOpts}
          </select>
        </div>
        <div>
          <label style="font-size:.6875rem;color:var(--text2);display:block;margin-bottom:3px">面积 m²</label>
          <input type="number" id="editArea" value="${d.area_m2||''}" placeholder="如 400"
            style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:6px;font-size:.8125rem">
        </div>
      </div>
      <div style="margin-bottom:8px">
        <label style="font-size:.6875rem;color:var(--text2);display:block;margin-bottom:3px">精准运费（货代报价，留空则系统预估）</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div style="position:relative">
            <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:.8125rem;color:var(--text2)">¥</span>
            <input type="number" id="editFreight" value="${freightVal}" placeholder="人民币金额"
              style="width:100%;padding:8px 8px 8px 22px;border:1.5px solid var(--border);border-radius:6px;font-size:.8125rem"
              oninput="updateFreightPreview()">
          </div>
          <div id="freightLocalPreview" style="padding:8px;border-radius:6px;font-size:.8125rem;background:#f8fafc;color:var(--primary);font-weight:600;display:flex;align-items:center;justify-content:center">
            —
          </div>
        </div>
      </div>
      <div style="margin-bottom:8px">
        <label style="font-size:.6875rem;color:var(--text2);display:block;margin-bottom:3px">预计交期（留空则自动取最长产品交期）</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <input type="date" id="editDeliveryDate" value="${d.override_delivery_date||''}" 
            style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:6px;font-size:.8125rem">
          <div style="padding:8px;border-radius:6px;font-size:.75rem;background:#f8fafc;color:var(--text2);display:flex;align-items:center;justify-content:center">
            ${d.auto_delivery_date ? ('自动: ' + d.auto_delivery_date) : '无产品交期数据'}
          </div>
        </div>
      </div>
      <div id="fxRateDisplay" style="padding:8px 0;font-size:.75rem;color:var(--text2);text-align:center;border-top:1px solid var(--border);margin-bottom:8px"></div>
      <button class="btn btn-outline" id="btnSaveInfo" style="width:100%;padding:8px;font-size:.8125rem">
        保存方案信息
      </button>
      <div id="saveInfoMsg" style="font-size:.75rem;color:var(--success);text-align:center;margin-top:6px;display:none"></div>
    </div>
  `;

  document.getElementById('infoCardHeader').addEventListener('click', () => {
    const body = document.getElementById('infoCardBody');
    const arrow = document.getElementById('infoCardArrow');
    if (body.style.display === 'none') {
      body.style.display = 'block';
      arrow.style.transform = 'rotate(180deg)';
    } else {
      body.style.display = 'none';
      arrow.style.transform = '';
    }
  });
  document.getElementById('btnSaveInfo').addEventListener('click', () => savePlanInfo(d.record_id));
  updateFreightPreview();

  // 渲染实时汇率
  const _fxEl = document.getElementById('fxRateDisplay');
  if (_fxEl) {
    const _fc = getCurrency();
    const _dateLabel = STATE.fx.dateLabel || '';
    const _rateDisplay = (typeof _fc.rate === 'number') ? _fc.rate.toFixed(4) : _fc.rate;
    _fxEl.textContent = _dateLabel ? (_dateLabel + ' 汇率：1 CNY = ' + _rateDisplay + ' ' + _fc.code) : ('当日汇率：1 CNY = ' + _rateDisplay + ' ' + _fc.code);
  }

  // ── 按分类分组的器材清单 ──
  const groups = {};
  (d.products||[]).forEach(p => {
    const cat = p.category_zh || p.category || '其他';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(p);
  });

  let _catIdx = 0;
  const _totalCount = (d.products||[]).length;
  const _autoExpand = _totalCount <= 20;
  let html = '<div class="card-title">当前器材清单 · ' + _totalCount + '台</div>';
  for (const [cat, prods] of Object.entries(groups)) {
    const cid = 'catGroup' + (_catIdx++);
    html += `<div class="cat-group">
      <div class="cat-group-title" onclick="toggleCatGroup('${cid}')" style="cursor:pointer;user-select:none">
        <span class="cat-arrow" id="${cid}Arrow">${_autoExpand ? '▼' : '▶'}</span> ${cat} <span class="cat-count">${prods.length}</span>
      </div>
      <div id="${cid}" style="display:${_autoExpand ? 'block' : 'none'}">`;
    prods.forEach(p => {
      html += `<div class="prod-row" onclick="openDetail('${p.record_id}')" style="cursor:pointer">
        <img class="prod-thumb" src="${p.image_url||''}" alt="" onerror="this.style.background='#e2e8f0'">
        <div class="prod-info">
          <div class="p-sku">${p.sku}</div>
          <div class="p-name">${p.name_zh || p.name}</div>
          <div class="p-price">¥${(p.sell_rmb||0).toLocaleString()} · ${fmtLocal(p.sell_rmb||0)}</div>
        </div>
        <button class="btn-remove" onclick="event.stopPropagation();removeSku('${p.record_id}','${p.sku}')" title="移除">✕</button>
      </div>`;
    });
    html += '</div></div>';
  }
  document.getElementById('editProductList').innerHTML = html;
}

async function savePlanInfo(recordId) {
  const btn = document.getElementById('btnSaveInfo');
  const msgEl = document.getElementById('saveInfoMsg');
  btn.disabled = true; btn.textContent = '保存中…';
  msgEl.style.display = 'none';

  const body = {
    market: document.getElementById('editMarket').value,
    area_m2: document.getElementById('editArea').value.trim() || null,
    override_freight_usd: document.getElementById('editFreight').value.trim() || null,
    override_delivery_date: document.getElementById('editDeliveryDate').value.trim() || null,
  };

  try {
    const r = await fetch('/api/client-plan/' + recordId + '/update-info', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);

    if (d.plan_id) {
      document.getElementById('editTitle').textContent = d.plan_id;
      if (STATE.editingDetail) STATE.editingDetail.plan_id = d.plan_id;
    }
    const newArea = document.getElementById('editArea').value.trim();
    const newDelivery = document.getElementById('editDeliveryDate').value.trim();
    if (STATE.editingDetail) {
      STATE.editingDetail.market = body.market;
      STATE.editingDetail.area_m2 = newArea;
      STATE.editingDetail.override_delivery_date = newDelivery || '';
    }
    const summaryEl = document.getElementById('editSummary');
    if (summaryEl && STATE.editingDetail) {
      const dd = STATE.editingDetail;
      const _sc2 = getCurrency();
      const _rmbT2 = Math.round(dd.sell_total_rmb||0);
      const _dd2 = dd.override_delivery_date || dd.auto_delivery_date || '';
      const _dl2 = _dd2 ? _dd2.replace(/^\d{4}-/, '').replace('-', '月') + '日' : '待定';
      const _da2 = !dd.override_delivery_date && dd.auto_delivery_date;
      summaryEl.innerHTML = `
        <div class="summary-item"><div class="s-val">${dd.n_products}</div><div class="s-label">台器材</div></div>
        <div class="summary-item"><div class="s-val">¥${_rmbT2.toLocaleString()}</div><div class="s-label" style="font-size:.6rem;line-height:1.3">${_sc2.symbol}${Math.round(_rmbT2*_sc2.rate).toLocaleString()} ${_sc2.code}</div></div>
        <div class="summary-item"><div class="s-val" style="font-size:${_dl2.length > 6 ? '.875rem' : '1.125rem'}">${_dl2}</div><div class="s-label">${_da2 ? '预估交期' : '交期'}</div></div>
      `;
    }

    // 刷新折叠摘要行
    const savedMarket = document.getElementById('editMarket').value;
    const savedArea = document.getElementById('editArea').value.trim();
    const savedFreight = document.getElementById('editFreight').value.trim();
    const ML = {'MY':'马来西亚','AU':'澳洲','NZ':'新西兰','CA':'加拿大'};
    const mktTxt = ML[savedMarket] || savedMarket || '未指定';
    const _frtRmb = savedFreight ? Number(savedFreight) : 0;
    const _frtCur = getCurrency();
    const frtTxt = _frtRmb ? ('¥' + _frtRmb.toLocaleString() + ' / ' + _frtCur.symbol + Math.round(_frtRmb * _frtCur.rate).toLocaleString()) : '系统预估';
    const headerRight = document.querySelector('#infoCardHeader > div:last-child > span:first-child');
    if (headerRight) headerRight.textContent = (savedArea||'—') + 'm² · 运费' + frtTxt;

    if (STATE.editingDetail) {
      STATE.editingDetail.override_freight_usd = savedFreight ? parseFloat(savedFreight) : 0;
    }

    msgEl.textContent = '已保存';
    msgEl.style.color = 'var(--success)';
    msgEl.style.display = 'block';
    showToast('方案信息已更新');
  } catch(e) {
    msgEl.textContent = '保存失败: ' + e.message;
    msgEl.style.color = 'var(--danger)';
    msgEl.style.display = 'block';
    showToast('保存失败');
  } finally {
    btn.disabled = false; btn.textContent = '保存方案信息';
  }
}

async function removeSku(productRid, sku) {
  if (!STATE.editingPlan) return;

  // ── 乐观更新：立刻从前端移除 ──
  STATE.editingSkuSet.delete(productRid);
  if (STATE.editingDetail) {
    STATE.editingDetail.products = (STATE.editingDetail.products||[]).filter(p => p.record_id !== productRid);
    STATE.editingDetail.n_products = STATE.editingDetail.products.length;
    STATE.editingDetail.sell_total_rmb = STATE.editingDetail.products.reduce((s,p) => s + (p.sell_rmb||0), 0);
    // 重算品类分布
    const cc = {};
    STATE.editingDetail.products.forEach(p => { const c = p.category_zh||'其他'; cc[c]=(cc[c]||0)+1; });
    STATE.editingDetail.cat_counts = cc;
    renderEditView(STATE.editingDetail);
  }
  renderProductGrid();
  showToast(`已移除 ${sku}`);

  // ── 异步写飞书 ──
  try {
    const r = await fetch(`/api/client-plan/${STATE.editingPlan}/remove-sku`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ product_record_id: productRid })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
  } catch(e) {
    // 写入失败：回滚
    showToast('同步失败，正在恢复: ' + e.message);
    STATE.editingSkuSet.add(productRid);
    await enterEditMode(STATE.editingPlan);
    renderProductGrid();
  }
}

async function addSku(productRid, sku) {
  if (!STATE.editingPlan) {
    showToast('请先选择一个客户方案');
    return;
  }

  // ── 乐观更新：立刻在前端添加 ──
  STATE.editingSkuSet.add(productRid);
  // 从 allProducts 找到该产品信息，塞入 editingDetail
  const prod = STATE.allProducts.find(p => p.record_id === productRid);
  if (prod && STATE.editingDetail) {
    STATE.editingDetail.products.push({
      record_id: prod.record_id,
      sku: prod.sku,
      name: prod.name,
      name_zh: prod.name_zh,
      category: prod.category,
      category_zh: prod.category_zh,
      cost_rmb: prod.cost_rmb || 0,
      margin: prod.margin || 0,
      sell_rmb: prod.sell_rmb || 0,
      price_fob_usd: prod.price_fob_usd,
      image_url: prod.image_url,
      video_url: prod.video_url || '',
      dimensions: prod.dimensions || '',
      net_weight: prod.net_weight || 0,
      weight_stack: prod.weight_stack || 0,
      area_m2: prod.area_m2 || 0,
      muscles: prod.muscles || [],
    });
    STATE.editingDetail.n_products = STATE.editingDetail.products.length;
    STATE.editingDetail.sell_total_rmb = STATE.editingDetail.products.reduce((s,p) => s + (p.sell_rmb||0), 0);
    const cc = {};
    STATE.editingDetail.products.forEach(p => { const c = p.category_zh||'其他'; cc[c]=(cc[c]||0)+1; });
    STATE.editingDetail.cat_counts = cc;
    renderEditView(STATE.editingDetail);
  }
  renderProductGrid();
  showToast(`已添加 ${sku}`);

  // ── 异步写飞书 ──
  try {
    const r = await fetch(`/api/client-plan/${STATE.editingPlan}/add-sku`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ product_record_id: productRid })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
  } catch(e) {
    // 写入失败：回滚
    showToast('同步失败，正在恢复: ' + e.message);
    STATE.editingSkuSet.delete(productRid);
    if (STATE.editingDetail) {
      STATE.editingDetail.products = STATE.editingDetail.products.filter(p => p.record_id !== productRid);
      STATE.editingDetail.n_products = STATE.editingDetail.products.length;
      STATE.editingDetail.fob_total_usd = STATE.editingDetail.products.reduce((s,p) => s + (p.price_fob_usd||0), 0);
    }
    renderProductGrid();
    await enterEditMode(STATE.editingPlan);
  }
}

/* ══════════════════════════════════════
   产品总库
   ══════════════════════════════════════ */
async function loadFilterOptions() {
  try {
    const r = await fetch('/api/filter-options');
    const d = await r.json();
    if (!d.ok) return;
    STATE.filterOptions = d;
    renderFilters();
  } catch(e) {}
}

function renderFilters() {
  // 分类 chips
  const catBox = document.getElementById('catFilters');
  let catHtml = '<span class="chip active" data-cat="">全部</span>';
  STATE.filterOptions.categories.forEach(c => {
    catHtml += `<span class="chip" data-cat="${c.code}">${c.label_zh}</span>`;
  });
  catBox.innerHTML = catHtml;
  catBox.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      catBox.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      STATE.activeCategory = chip.dataset.cat;
      loadProducts();
    });
  });

  // 肌群 chips
  const muscleBox = document.getElementById('muscleFilters');
  let mHtml = '<span class="chip active" data-muscle="">全部肌群</span>';
  STATE.filterOptions.muscles.forEach(m => {
    mHtml += `<span class="chip" data-muscle="${m}">${m}</span>`;
  });
  muscleBox.innerHTML = mHtml;
  muscleBox.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      muscleBox.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      STATE.activeMuscle = chip.dataset.muscle;
      loadProducts();
    });
  });
}

let _searchTimer = null;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => loadProducts(), 300);
});

async function loadProducts() {
  // 首次无数据时先渲染缓存
  if (!STATE.allProducts.length) {
    try {
      const cached = localStorage.getItem('admin_products_cache');
      if (cached) {
        const c = JSON.parse(cached);
        STATE.allProducts = c.products || [];
        renderProductGrid();
      }
    } catch(e) {}
  }
  const keyword = document.getElementById('searchInput').value.trim();
  const params = new URLSearchParams();
  if (STATE.activeCategory) params.set('category', STATE.activeCategory);
  if (STATE.activeMuscle) params.set('muscle', STATE.activeMuscle);
  if (keyword) params.set('keyword', keyword);

  try {
    const r = await fetch('/api/products?' + params.toString());
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    STATE.allProducts = d.products || [];
    try { localStorage.setItem('admin_products_cache', JSON.stringify({products: d.products, ts: Date.now()})); } catch(ex) {}
    renderProductGrid();
  } catch(e) {
    document.getElementById('productGrid').innerHTML = `<div class="empty-state" style="grid-column:1/-1">加载失败: ${e.message}</div>`;
  }
}

function renderProductGrid() {
  const grid = document.getElementById('productGrid');
  if (!STATE.allProducts.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">无匹配产品</div>';
    return;
  }
  grid.innerHTML = STATE.allProducts.map(p => {
    const inPlan = STATE.editingSkuSet.has(p.record_id);
    return `<div class="product-card">
      <img class="pc-img" src="${p.image_url||''}" alt="${p.sku}" onerror="this.style.background='#e2e8f0'" loading="lazy" onclick="event.stopPropagation();openDetail('${p.record_id}')">
      <button class="pc-action ${inPlan?'added':'add'}"
        onclick="event.stopPropagation();${inPlan ? `removeSku('${p.record_id}','${p.sku}')` : `addSku('${p.record_id}','${p.sku}')`}">
        ${inPlan?'✓':'+'}
      </button>
      <div class="pc-body">
        <div class="pc-sku">${p.sku} · ${p.category_zh||''}</div>
        <div class="pc-name">${p.name_zh || p.name}</div>
        <div class="pc-price">¥${(p.sell_rmb||0).toLocaleString()}</div>
      </div>
    </div>`;
  }).join('');
}

function updateEditingBanner() {
  const banner = document.getElementById('editingBanner');
  if (STATE.editingPlan && STATE.editingDetail) {
    banner.className = 'editing-banner';
    banner.textContent = `正在编辑：${STATE.editingDetail.client_name}（当前 ${STATE.editingDetail.n_products} 台）`;
  } else {
    banner.className = 'editing-banner warn';
    banner.textContent = '请先在「方案管理」中选择一个客户方案';
  }
}

/* ══════════════════════════════════════
   生成网页
   ══════════════════════════════════════ */
document.getElementById('btnGenerate').addEventListener('click', async () => {
  if (!STATE.editingDetail) return;
  const btn = document.getElementById('btnGenerate');
  const btnText = document.getElementById('btnGenText');
  const logBox = document.getElementById('genLog');
  const resultBox = document.getElementById('genResult');

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px"></span> 生成中…';
  resultBox.style.display = 'none';
  logBox.textContent = ''; logBox.classList.add('active');

  try {
    const r = await fetch('/api/generate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        plan_id: STATE.editingDetail.plan_id,
        client_id: STATE.editingDetail.plan_id
      })
    });
    const d = await r.json();
    logBox.textContent = d.output || '';
    if (!d.ok) throw new Error(d.error);

    const url = d.preview_url || '';
    const version = d.version || '';
    STATE._lastPreviewUrl = url;
    STATE._lastVersion = version;
    // 构建线上链接
    const pathPart = url.startsWith('/') ? url : '/' + url;
    STATE._lastOnlineUrl = 'https://www.provenlift.com' + pathPart;
    
    document.getElementById('genResultUrl').textContent = '本地预览已生成 ' + version;
    document.getElementById('genResultUrl').className = 'result-url';
    resultBox.style.display = 'block';
    document.getElementById('btnDeploy').disabled = false;
    document.getElementById('btnCopyUrl').style.display = 'none';
    document.getElementById('btnOpenOnline').style.display = 'none';
    document.getElementById('btnOpenUrl').style.display = '';
    showToast('预览已生成 ' + version);
  } catch(e) {
    document.getElementById('genResultUrl').textContent = '错误: ' + e.message;
    document.getElementById('genResultUrl').className = 'result-url error';
    document.getElementById('genResult').style.display = 'block';
    showToast('生成失败');
  } finally {
    btn.disabled = false;
    btnText.textContent = '重新生成预览';
  }
});

document.getElementById('btnCopyUrl').addEventListener('click', () => {
  const url = STATE._lastOnlineUrl;
  if (!url) return;
  navigator.clipboard.writeText(url).then(()=>showToast('客户链接已复制')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('客户链接已复制');
  });
});
document.getElementById('btnOpenUrl').addEventListener('click', () => {
  if (STATE._lastPreviewUrl) window.open(STATE._lastPreviewUrl, '_blank');
});

/* ══════════════════════════════════════
   历史记录
   ══════════════════════════════════════ */
function getHistory(){try{return JSON.parse(localStorage.getItem('admin_history')||'[]');}catch(e){return[];}}
function saveHistory(planId, client, url, version){
  const h=getHistory();
  h.unshift({planId,client,url,version:version||'',time:new Date().toLocaleString('zh-CN')});
  if(h.length>30) h.length=30;
  localStorage.setItem('admin_history',JSON.stringify(h));
  renderHistory();
}
function renderHistory(){
  const box=document.getElementById('historyList');
  const h=getHistory();
  if(!h.length){box.innerHTML='<div class="empty-state">暂无记录</div>';return;}
  box.innerHTML=h.map(item=>`
    <div class="history-item">
      <div class="history-meta">
        <div class="h-plan">${item.planId} · ${item.client} ${item.version ? '<span style="color:var(--primary);font-size:.6875rem;font-weight:600">'+item.version+'</span>' : ''}</div>
        <div class="h-time">${item.time}</div>
      </div>
      <div class="history-actions">
        <button class="btn-sm copy" data-url="${item.url}">复制</button>
        <button class="btn-sm open" data-url="${item.url}">打开</button>
      </div>
    </div>
  `).join('');
}
document.getElementById('historyList').addEventListener('click', e => {
  const btn = e.target.closest('.btn-sm'); if (!btn) return;
  const url = btn.dataset.url; if (!url) return;
  if (btn.classList.contains('copy')) {
    navigator.clipboard.writeText(url).then(()=>showToast('已复制')).catch(()=>showToast('复制失败'));
  } else if (btn.classList.contains('open')) {
    window.open(url,'_blank');
  }
});

/* ══════════════════════════════════════
   工具函数
   ══════════════════════════════════════ */
async function refreshCache() {
  showToast('正在刷新数据…');
  try { localStorage.removeItem('admin_plans_cache'); localStorage.removeItem('admin_products_cache'); } catch(e) {}
  try {
    await fetch('/api/refresh-cache', {method:'POST'});
    await loadPlans();
    if (STATE.allProducts.length) await loadProducts();
    if (STATE.editingPlan) await enterEditMode(STATE.editingPlan);
    showToast('数据已刷新');
  } catch(e) { showToast('刷新失败'); }
}

/* ══════════════════════════════════════
   产品详情浮层
   ══════════════════════════════════════ */
function toggleCatGroup(cid) {
  const body = document.getElementById(cid);
  const arrow = document.getElementById(cid + 'Arrow');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    arrow.textContent = '▼';
  } else {
    body.style.display = 'none';
    arrow.textContent = '▶';
  }
}

function openDetail(recordId) {
  // 从 allProducts 或 editingDetail.products 中找
  let p = STATE.allProducts.find(x => x.record_id === recordId);
  if (!p && STATE.editingDetail) {
    p = (STATE.editingDetail.products||[]).find(x => x.record_id === recordId);
  }
  if (!p) { showToast('未找到产品信息'); return; }

  const cur = getCurrency();
  const sellLocal = Math.round((p.sell_rmb||0) * cur.rate);

  let mediaHtml = '';
  if (p.video_url) {
    mediaHtml = `<div class="detail-media">
      <video src="${p.video_url}" controls playsinline preload="metadata" style="width:100%;max-height:240px"></video>
      <div class="detail-video-badge">试机视频</div>
    </div>`;
  } else if (p.image_url) {
    mediaHtml = `<div class="detail-media">
      <img src="${p.image_url}" alt="${p.sku}" onerror="this.style.background='#e2e8f0'">
    </div>`;
  }

  let muscleHtml = '';
  if (p.muscles && p.muscles.length) {
    muscleHtml = '<div class="detail-muscles">' + p.muscles.map(m => `<span class="detail-muscle-tag">${m}</span>`).join('') + '</div>';
  }

  let specsHtml = '<div class="detail-specs">';
  if (p.dimensions) specsHtml += `<div class="detail-spec-row"><span class="detail-spec-key">尺寸</span><span class="detail-spec-val">${p.dimensions}</span></div>`;
  if (p.net_weight) specsHtml += `<div class="detail-spec-row"><span class="detail-spec-key">净重</span><span class="detail-spec-val">${p.net_weight} kg</span></div>`;
  if (p.weight_stack) specsHtml += `<div class="detail-spec-row"><span class="detail-spec-key">配重</span><span class="detail-spec-val">${p.weight_stack} kg</span></div>`;
  if (p.area_m2) specsHtml += `<div class="detail-spec-row"><span class="detail-spec-key">占地</span><span class="detail-spec-val">${p.area_m2} m²</span></div>`;
  specsHtml += `<div class="detail-spec-row"><span class="detail-spec-key">分类</span><span class="detail-spec-val">${p.category_zh||p.category||''}</span></div>`;
  specsHtml += `<div class="detail-spec-row"><span class="detail-spec-key">利润率</span><span class="detail-spec-val">${Math.round((p.margin)*100)}%</span></div>`;
  specsHtml += '</div>';

  const html = `
    ${mediaHtml}
    <div class="detail-name">${p.name_zh || p.name}</div>
    <div class="detail-sku">${p.sku} · ${p.name || ''}</div>
    <div class="detail-prices">
      <div class="detail-price-box cost">
        <div class="dp-label">采购价</div>
        <div class="dp-val">¥${(p.cost_rmb||0).toLocaleString()}</div>
      </div>
      <div class="detail-price-box sell">
        <div class="dp-label">售价 ${cur.code}</div>
        <div class="dp-val">${cur.symbol}${sellLocal.toLocaleString()}</div>
      </div>
    </div>
    <div class="detail-price-sub">售价 RMB ¥${(p.sell_rmb||0).toLocaleString()} · 利润率 ${Math.round((p.margin)*100)}%</div>
    ${muscleHtml}
    ${specsHtml}
  `;

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('active');
}

function closeDetail() {
  const overlay = document.getElementById('detailOverlay');
  overlay.querySelector('.detail-sheet').style.transform = 'translateY(100%)';
  setTimeout(() => {
    overlay.classList.remove('active');
    overlay.querySelector('.detail-sheet').style.transform = '';
    // 暂停视频
    const v = overlay.querySelector('video');
    if (v) { v.pause(); v.currentTime = 0; }
  }, 300);
}

function updateFreightPreview() {
  const input = document.getElementById('editFreight');
  const preview = document.getElementById('freightLocalPreview');
  if (!input || !preview) return;
  const val = parseFloat(input.value);
  if (!val || isNaN(val)) { preview.textContent = '—'; return; }
  const cur = getCurrency();
  const local = Math.round(val * cur.rate);
  preview.textContent = cur.symbol + local.toLocaleString() + ' ' + cur.code;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

/* ══════════════════════════════════════
   初始化
   ══════════════════════════════════════ */
// "发给客户"按钮：部署到线上
document.getElementById('btnDeploy').addEventListener('click', async () => {
  const btn = document.getElementById('btnDeploy');
  const btnText = document.getElementById('btnDeployText');
  const logBox = document.getElementById('genLog');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px"></span> 部署中…';
  
  try {
    const r = await fetch('/api/deploy', { method: 'POST' });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    
    logBox.textContent = (logBox.textContent || '') + '\n--- 部署输出 ---\n' + (d.output || '');
    document.getElementById('genResultUrl').textContent = STATE._lastOnlineUrl;
    document.getElementById('genResultUrl').className = 'result-url';
    document.getElementById('btnCopyUrl').style.display = '';
    document.getElementById('btnOpenOnline').style.display = '';
    
    // 存历史（线上链接）
    saveHistory(STATE.editingDetail.plan_id, STATE.editingDetail.client_name, STATE._lastOnlineUrl, STATE._lastVersion);
    showToast('已部署上线！');
  } catch(e) {
    showToast('部署失败: ' + e.message);
    logBox.textContent = (logBox.textContent || '') + '\n--- 部署失败 ---\n' + e.message;
  } finally {
    btn.disabled = false;
    btnText.textContent = '发给客户';
  }
});

// "打开线上"按钮
document.getElementById('btnOpenOnline').addEventListener('click', () => {
  if (STATE._lastOnlineUrl) window.open(STATE._lastOnlineUrl, '_blank');
});

loadFxRates();
loadPlans();
renderHistory();
</script>
