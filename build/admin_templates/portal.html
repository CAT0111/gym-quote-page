<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProvenLift 工作台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#e4e9f0 100%);min-height:100vh;padding:24px 16px}
.header{text-align:center;padding:48px 0 36px}
.header h1{font-size:28px;font-weight:700;color:#1a1a2e;letter-spacing:-0.5px}
.header p{font-size:15px;color:#8b92a5;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:880px;auto}
@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr);gap:14px}}
@media(max-width:480px){.grid{grid-template-columns:1fr;gap:12px}}
.card{background:#fff;border-radius:16px;padding:28px 24px;cursor:pointer;text-decoration:none;color:inherit;transition:all .25s ease;border:1px solid rgba(0,0,0,.06);box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;flex-direction:column;align-items:flex-start}
.card:hover{box-shadow:0 8px 30px rgba(0,0,0,.1);transform:translateY(-3px);border-color:rgba(0,0,0,.08)}
.card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px}
.icon-sales{background:#eef2ff;color:#4f46e5}
.icon-media{background:#fef3c7;color:#d97706}
.icon-entry{background:#ecfdf5;color:#059669}
.icon-qc{background:#fce7f3;color:#db2777}
.icon-freight{background:#e0f2fe;color:#0284c7}
.icon-preview{background:#f3e8ff;color:#7c3aed}
.card-title{font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:6px}
.card-desc{font-size:13px;color:#8b92a5;line-height:1.6;flex:1}
.card-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:6px;margin-top:14px}
.badge-live{background:#ecfdf5;color:#059669}
.badge-ext{background:#eef2ff;color:#4f46e5}
.footer{text-align:center;padding:48px 0 24px;font-size:12px;color:#b0b7c3}
</style>
</head>
<body>
<div class="header">
  <h1>ProvenLift 工作台</h1>
  <p>选择你要进入的模块</p>
</div>
<div class="grid">
  <a class="card" href="/admin" data-role="sales">
    <div class="card-icon icon-sales">🏢</div>
    <div class="card-title">业务员后台</div>
    <div class="card-desc">方案管理 · 产品选品 · 一键生成客户报价页</div>
    <span class="card-badge badge-live">已上线</span>
  </a>
  <a class="card" href="/shoot" data-role="media">
    <div class="card-icon icon-media">📸</div>
    <div class="card-title">拍摄任务管理</div>
    <div class="card-desc">素材拍摄分配 · 进度跟踪 · 审核回写</div>
    <span class="card-badge badge-live">已上线</span>
  </a>
  <a class="card" href="https://c00mufyoyl.feishu.cn/share/base/form/shrcnr5kEbzA4qotyvpUw2ELuMg" target="_blank" data-role="entry">
    <div class="card-icon icon-entry">📝</div>
    <div class="card-title">文员录入产品</div>
    <div class="card-desc">通过飞书表单录入新产品信息</div>
    <span class="card-badge badge-ext">飞书表单</span>
  </a>
  <a class="card" href="https://c00mufyoyl.feishu.cn/share/base/form/shrcnigfwAMXW9neIXnnCBRecHy" target="_blank" data-role="qc">
    <div class="card-icon icon-qc">🎬</div>
    <div class="card-title">工厂上传试机视频</div>
    <div class="card-desc">选择客户和 SKU，粘贴视频链接</div>
    <span class="card-badge badge-ext">飞书表单</span>
  </a>
  <a class="card" href="https://c00mufyoyl.feishu.cn/share/base/form/shrcn9IESxIJUP1asii9OzPHgfd" target="_blank" data-role="freight">
    <div class="card-icon icon-freight">🚢</div>
    <div class="card-title">货代更新物流费率</div>
    <div class="card-desc">按国家和柜型维护 6 大模块基准价</div>
    <span class="card-badge badge-ext">飞书表单</span>
  </a>
  <a class="card" href="https://www.provenlift.com" target="_blank" data-role="preview">
    <div class="card-icon icon-preview">🌐</div>
    <div class="card-title">客户页面预览</div>
    <div class="card-desc">查看线上客户报价页面效果</div>
    <span class="card-badge badge-live">已上线</span>
  </a>
</div>
<div class="footer">ProvenLift 内部工作台</div>
</body>
</html>
